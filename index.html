<body>

  <div class="container">

    <h1>Counter App</h1>

    <p class="description">
      A simple counter application with increase, decrease, and reset functionality.
    </p>

    <div class="counter-box">
      <h2 id="count">0</h2>

      <div class="buttons">
        <button onclick="increase()">Increase</button>
        <button onclick="decrease()">Decrease</button>
        <button onclick="reset()">Reset</button>
      </div>
    </div>

  </div>

  <script src="script.js"></script>

</body>
